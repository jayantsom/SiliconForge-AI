services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: siliconforge
      POSTGRES_PASSWORD: siliconforge
      POSTGRES_DB: siliconforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siliconforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Override to reach host Ollama from inside Docker
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./chroma_store:/app/chroma_store
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
